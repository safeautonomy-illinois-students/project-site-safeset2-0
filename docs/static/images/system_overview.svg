<svg width="780" height="480" xmlns="http://www.w3.org/2000/svg" font-family="'Arial','Helvetica',sans-serif">
  <rect width="780" height="480" fill="white"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1E293B"/>
    </marker>
  </defs>

  <!-- ── Outer frame ── -->
  <rect x="18" y="18" width="744" height="444" rx="18"
        fill="#F8FAFF" stroke="#1E293B" stroke-width="2.5"/>
  <text x="36" y="455" font-size="14" font-weight="bold" fill="#1E293B">CrazySim SITL  ·  Testing &amp; Verification</text>

  <!-- ── Physics: Gazebo Garden ── -->
  <rect x="220" y="48" width="340" height="96" rx="14" fill="#3B5FC0"/>
  <text x="232" y="64" font-size="11" font-style="italic" fill="#BFDBFE" opacity="0.8">[ Physics ]</text>
  <text x="390" y="84"  text-anchor="middle" font-size="20" font-weight="bold" fill="white">Gazebo Garden</text>
  <text x="390" y="106" text-anchor="middle" font-size="12" fill="#BFDBFE">drone dynamics  ·  rigid-body physics</text>
  <text x="390" y="124" text-anchor="middle" font-size="11" fill="#93C5FD">(Physics simulation)</text>

  <!-- ── Actuators: CrazyFlie Motors ── -->
  <rect x="36" y="178" width="170" height="100" rx="12" fill="#3B5FC0"/>
  <text x="48" y="194" font-size="11" font-style="italic" fill="#BFDBFE" opacity="0.8">[ Actuators ]</text>
  <text x="121" y="215" text-anchor="middle" font-size="16" font-weight="bold" fill="white">CrazyFlie</text>
  <text x="121" y="235" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Motors</text>
  <text x="121" y="256" text-anchor="middle" font-size="11" fill="#BFDBFE">4× PWM signals</text>

  <!-- ── Sensors: Motion Capture ── -->
  <rect x="572" y="178" width="170" height="100" rx="12" fill="#3B5FC0"/>
  <text x="584" y="194" font-size="11" font-style="italic" fill="#BFDBFE" opacity="0.8">[ Sensors ]</text>
  <text x="657" y="215" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Motion</text>
  <text x="657" y="235" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Capture</text>
  <text x="657" y="256" text-anchor="middle" font-size="11" fill="#BFDBFE">/cf_1/pose</text>

  <!-- ── Autonomy Stack outer box ── -->
  <rect x="208" y="308" width="362" height="130" rx="12"
        fill="#3B5FC0" stroke="#0F1E5E" stroke-width="2.5"/>

  <!-- ── Controller inner box ── -->
  <rect x="216" y="316" width="164" height="114" rx="8"
        fill="#2D4DAF" stroke="#0F1E5E" stroke-width="1.5"/>
  <text x="298" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Controller</text>
  <line x1="226" y1="348" x2="370" y2="348" stroke="#3B5FC0" stroke-width="0.8" opacity="0.6"/>
  <text x="298" y="364" text-anchor="middle" font-size="10" fill="#BFDBFE">waypoint_follower.py</text>
  <text x="298" y="380" text-anchor="middle" font-size="10" fill="#93C5FD">→ min-snap + PD</text>
  <text x="298" y="396" text-anchor="middle" font-size="10" fill="#93C5FD">(Decision &amp; Control)</text>

  <!-- ── State Estimation inner box ── -->
  <rect x="384" y="316" width="178" height="114" rx="8"
        fill="#2D4DAF" stroke="#0F1E5E" stroke-width="1.5"/>
  <text x="473" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Perception</text>
  <line x1="394" y1="348" x2="552" y2="348" stroke="#3B5FC0" stroke-width="0.8" opacity="0.6"/>
  <!-- Kalman Filter badge -->
  <rect x="413" y="356" width="120" height="20" rx="10" fill="#1E3A8A"/>
  <text x="473" y="371" text-anchor="middle" font-size="10" font-weight="bold" fill="#93C5FD">Kalman Filter</text>
  <text x="473" y="391" text-anchor="middle" font-size="10" fill="#BFDBFE">fuses /cf_1/pose + IMU</text>
  <text x="473" y="409" text-anchor="middle" font-size="11" font-style="italic" fill="#BFDBFE">x, v, &#x03C6;, &#x03B8;, &#x03C8;, &#x03C9;</text>

  <!-- ── Arrows ── -->

  <!-- 1. Motors → Gazebo (up then right) -->
  <path d="M 121,178 V 96 H 219"
        fill="none" stroke="#1E293B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 2. Gazebo → MotCap (right then down) -->
  <path d="M 560,96 H 657 V 177"
        fill="none" stroke="#1E293B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 3. MotCap → Autonomy Stack (down then left) -->
  <path d="M 657,278 V 373 H 571"
        fill="none" stroke="#1E293B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 4. Autonomy Stack → Motors (left then up) -->
  <path d="M 208,373 H 121 V 279"
        fill="none" stroke="#1E293B" stroke-width="2" marker-end="url(#arr)"/>
</svg>
