<svg width="600" height="720" xmlns="http://www.w3.org/2000/svg" font-family="'Arial','Helvetica',sans-serif">
  <rect width="600" height="720" fill="white"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#111827">Cascaded Controller Architecture</text>

  <!-- ── 1. Waypoints / Trajectory ── -->
  <rect x="120" y="40" width="360" height="58" rx="8"
        fill="#FEF9C3" stroke="#CA8A04" stroke-width="2"/>
  <text x="300" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#78350F">Waypoints / Trajectory</text>
  <text x="300" y="84" text-anchor="middle" font-size="11" fill="#92400E">reference path r(t) through gate sequence</text>

  <!-- arrow 1→2 -->
  <line x1="300" y1="99" x2="300" y2="131" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── 2. Outer-loop Controller ── -->
  <rect x="120" y="132" width="360" height="120" rx="8" fill="#1D4ED8"/>
  <text x="300" y="158" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Outer-loop Controller</text>
  <text x="300" y="178" text-anchor="middle" font-size="12" fill="#BFDBFE">(PID or MPC)</text>
  <line x1="138" y1="188" x2="462" y2="188" stroke="#3B82F6" stroke-width="0.8" opacity="0.6"/>
  <text x="300" y="207" text-anchor="middle" font-size="11" fill="#BFDBFE">Computes desired attitude &amp; thrust:</text>
  <text x="300" y="228" text-anchor="middle" font-size="15" font-style="italic" fill="white">&#x03C6;&#x2099; ,  &#x03B8;&#x2099; ,  &#x03C8;&#x2099; ,  u&#x1D40;</text>
  <text x="300" y="245" text-anchor="middle" font-size="11" fill="#93C5FD">(roll cmd,  pitch cmd,  yaw cmd,  throttle)</text>

  <!-- arrow 2→3 -->
  <line x1="300" y1="253" x2="300" y2="285" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <text x="308" y="274" font-size="10" fill="#64748B" font-style="italic">attitude setpoints</text>

  <!-- ── 3. Inner-loop PID (Firmware) ── -->
  <rect x="120" y="286" width="360" height="102" rx="8" fill="#1E40AF"/>
  <text x="300" y="312" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Inner-loop PID</text>
  <text x="300" y="332" text-anchor="middle" font-size="12" fill="#BFDBFE">(CrazyFlie Firmware)</text>
  <line x1="138" y1="342" x2="462" y2="342" stroke="#3B82F6" stroke-width="0.8" opacity="0.6"/>
  <text x="300" y="361" text-anchor="middle" font-size="11" fill="#93C5FD">stabilizes &#x03C6;, &#x03B8;, &#x03C8; and thrust</text>
  <text x="300" y="378" text-anchor="middle" font-size="11" fill="#93C5FD">outputs per-motor PWM signals</text>

  <!-- arrow 3→4 -->
  <line x1="300" y1="389" x2="300" y2="421" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <text x="308" y="410" font-size="10" fill="#64748B" font-style="italic">motor PWM commands</text>

  <!-- ── 4. Motors ── -->
  <rect x="185" y="422" width="230" height="56" rx="8" fill="#374151"/>
  <text x="300" y="446" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Motors</text>
  <text x="300" y="465" text-anchor="middle" font-size="11" fill="#D1D5DB">generate thrust &amp; torque</text>

  <!-- arrow 4→5 -->
  <line x1="300" y1="479" x2="300" y2="511" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── 5. Drone Motion ── -->
  <rect x="185" y="512" width="230" height="62" rx="8" fill="#374151"/>
  <text x="300" y="538" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Drone Motion</text>
  <text x="300" y="557" text-anchor="middle" font-size="11" fill="#D1D5DB">position · velocity · attitude</text>
  <text x="300" y="571" text-anchor="middle" font-size="10" fill="#9CA3AF">evolve under physics</text>

  <!-- arrow 5→6 -->
  <line x1="300" y1="575" x2="300" y2="607" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── 6. Sensors & State Estimation ── -->
  <rect x="120" y="608" width="360" height="90" rx="8" fill="#0F766E"/>
  <text x="300" y="634" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Sensors &amp; State Estimation</text>
  <line x1="138" y1="644" x2="462" y2="644" stroke="#2DD4BF" stroke-width="0.8" opacity="0.6"/>
  <text x="300" y="664" text-anchor="middle" font-size="12" fill="#99F6E4">IMU  ·  Motion Capture  ·  Optical Flow</text>
  <text x="300" y="685" text-anchor="middle" font-size="11" fill="#A7F3D0">estimates  x,  v,  &#x03C6;,  &#x03B8;,  &#x03C8;,  &#x03C9;</text>

  <!-- ── Feedback arrow (right side, red) ── -->
  <!-- from right of Sensors → right → up → left into Outer-loop -->
  <path d="M 480,653 H 552 V 192 H 481"
        fill="none" stroke="#DC2626" stroke-width="2.5"
        marker-end="url(#arr-red)"/>

  <!-- Feedback label (rotated, reading upward) -->
  <text transform="translate(567, 430) rotate(-90)"
        text-anchor="middle" font-size="11" font-weight="bold" fill="#DC2626">state feedback  ( x, v, &#x03C6;, &#x03B8;, &#x03C8;, &#x03C9; )</text>
</svg>
